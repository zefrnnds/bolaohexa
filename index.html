<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 Bolão da Copa 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>🏆 Bolão da Copa 2026</h1>
        <div class="toggle-buttons">
            <button id="btn-ranking" class="btn">🏅 Placar Geral</button>
            <button id="btn-jogos" class="btn">⚽ Jogos</button>
            <button id="btn-palpites" class="btn">🎯 Palpites</button>
            <button id="btn-refresh" class="btn" style="background: rgba(255,215,0,0.2); border-color: var(--gold);">🔄 Atualizar</button>
        </div>
        <div id="filter-container" class="filter-container" style="display: none;">
            <div class="filter-group">
                <label for="select-participant">👤 Participante:</label>
                <select id="select-participant">
                    <option value="">Selecione...</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="select-group"> Grupo:</label>
                <select id="select-group">
                    <option value="todos">Todos os Grupos</option>
                    <option value="A">Grupo A</option>
                    <option value="B">Grupo B</option>
                    <option value="C">Grupo C</option>
                    <option value="D">Grupo D</option>
                    <option value="E">Grupo E</option>
                    <option value="F">Grupo F</option>
                    <option value="G">Grupo G</option>
                    <option value="H">Grupo H</option>
                    <option value="I">Grupo I</option>
                    <option value="J">Grupo J</option>
                    <option value="K">Grupo K</option>
                    <option value="L">Grupo L</option>
                </select>
            </div>
        </div>
    </header>
    <main id="content"></main>
    <script src="script.js"></script>

  <script>
(function() {
  'use strict';
  
  const LINK_GRUPO = 'https://chat.whatsapp.com/Ld5Tt3kvD240Dlq3YFV03I?s=cl&p=a&mlu=1&amv=0';
  
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
  
  function init() {
    const whatsappBtn = document.getElementById('whatsapp-float');
    if (!whatsappBtn) {
      console.warn('Botão WhatsApp não encontrado');
      return;
    }
    
    let isDragging = false;
    let hasMoved = false;
    let startX, startY;
    let initialLeft, initialTop;
    let clickStartTime = 0;
    
    // Carrega posição salva
    try {
      const savedPosition = localStorage.getItem('whatsappBtnPosition');
      if (savedPosition) {
        const pos = JSON.parse(savedPosition);
        if (pos.left >= 0 && pos.top >= 0 && 
            pos.left < window.innerWidth && pos.top < window.innerHeight) {
          whatsappBtn.style.left = pos.left + 'px';
          whatsappBtn.style.top = pos.top + 'px';
          whatsappBtn.style.right = 'auto';
          whatsappBtn.style.bottom = 'auto';
        }
      }
    } catch (e) {
      console.warn('Erro ao carregar posição');
    }
    
    // Salva posição
    function savePosition() {
      try {
        const rect = whatsappBtn.getBoundingClientRect();
        localStorage.setItem('whatsappBtnPosition', JSON.stringify({
          left: Math.round(rect.left),
          top: Math.round(rect.top)
        }));
      } catch (e) {}
    }
    
    // Abre o link
    function openLink() {
      // Tenta abrir em nova aba
      const newWindow = window.open(LINK_GRUPO, '_blank', 'noopener,noreferrer');
      
      // Se o navegador bloqueou, abre na mesma aba
      if (!newWindow || newWindow.closed || typeof newWindow.closed === 'undefined') {
        window.location.href = LINK_GRUPO;
      }
    }
    
    // ===== MOUSE (Desktop) =====
    whatsappBtn.addEventListener('mousedown', function(e) {
      if (e.button !== 0) return;
      e.preventDefault();
      isDragging = true;
      hasMoved = false;
      clickStartTime = Date.now();
      whatsappBtn.classList.add('dragging');
      
      const rect = whatsappBtn.getBoundingClientRect();
      startX = e.clientX;
      startY = e.clientY;
      initialLeft = rect.left;
      initialTop = rect.top;
      
      whatsappBtn.style.left = rect.left + 'px';
      whatsappBtn.style.top = rect.top + 'px';
      whatsappBtn.style.right = 'auto';
      whatsappBtn.style.bottom = 'auto';
    });
    
    document.addEventListener('mousemove', function(e) {
      if (!isDragging) return;
      e.preventDefault();
      
      const dx = e.clientX - startX;
      const dy = e.clientY - startY;
      
      if (Math.abs(dx) > 5 || Math.abs(dy) > 5) {
        hasMoved = true;
      }
      
      let newLeft = initialLeft + dx;
      let newTop = initialTop + dy;
      
      const btnWidth = whatsappBtn.offsetWidth;
      const btnHeight = whatsappBtn.offsetHeight;
      
      newLeft = Math.max(0, Math.min(newLeft, window.innerWidth - btnWidth));
      newTop = Math.max(0, Math.min(newTop, window.innerHeight - btnHeight));
      
      whatsappBtn.style.left = newLeft + 'px';
      whatsappBtn.style.top = newTop + 'px';
    });
    
    document.addEventListener('mouseup', function() {
      if (!isDragging) return;
      
      isDragging = false;
      whatsappBtn.classList.remove('dragging');
      
      if (hasMoved) {
        savePosition();
      } else {
        // Se não moveu, abre o link
        openLink();
      }
    });
    
    // ===== TOUCH (Celular) =====
    whatsappBtn.addEventListener('touchstart', function(e) {
      isDragging = true;
      hasMoved = false;
      clickStartTime = Date.now();
      whatsappBtn.classList.add('dragging');
      
      const touch = e.touches[0];
      const rect = whatsappBtn.getBoundingClientRect();
      startX = touch.clientX;
      startY = touch.clientY;
      initialLeft = rect.left;
      initialTop = rect.top;
      
      whatsappBtn.style.left = rect.left + 'px';
      whatsappBtn.style.top = rect.top + 'px';
      whatsappBtn.style.right = 'auto';
      whatsappBtn.style.bottom = 'auto';
    }, { passive: true });
    
    document.addEventListener('touchmove', function(e) {
      if (!isDragging) return;
      
      const touch = e.touches[0];
      const dx = touch.clientX - startX;
      const dy = touch.clientY - startY;
      
      if (Math.abs(dx) > 5 || Math.abs(dy) > 5) {
        hasMoved = true;
      }
      
      let newLeft = initialLeft + dx;
      let newTop = initialTop + dy;
      
      const btnWidth = whatsappBtn.offsetWidth;
      const btnHeight = whatsappBtn.offsetHeight;
      
      newLeft = Math.max(0, Math.min(newLeft, window.innerWidth - btnWidth));
      newTop = Math.max(0, Math.min(newTop, window.innerHeight - btnHeight));
      
      whatsappBtn.style.left = newLeft + 'px';
      whatsappBtn.style.top = newTop + 'px';
      
      if (hasMoved) {
        e.preventDefault();
      }
    }, { passive: false });
    
    document.addEventListener('touchend', function() {
      if (!isDragging) return;
      
      isDragging = false;
      whatsappBtn.classList.remove('dragging');
      
      if (hasMoved) {
        savePosition();
      } else {
        openLink();
      }
    });
    
    // Duplo clique = resetar posição
    whatsappBtn.addEventListener('dblclick', function(e) {
      e.preventDefault();
      e.stopPropagation();
      
      try {
        localStorage.removeItem('whatsappBtnPosition');
      } catch (e) {}
      
      whatsappBtn.style.left = '';
      whatsappBtn.style.top = '';
      whatsappBtn.style.right = '25px';
      whatsappBtn.style.bottom = '25px';
    });
  }
})();
</script>
</div>
</body>
</html>
